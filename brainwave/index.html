<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BRAINWAVE — Unique Trivia</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ──── HOME SCREEN ──── -->
  <section id="screen-home" class="screen">
    <h1>BRAIN<span class="accent">WAVE</span></h1>
    <p class="tagline">The only right answer is the one nobody else thought of.</p>

    <div id="home-error" class="error hidden"></div>

    <label for="input-name">Your name</label>
    <input id="input-name" type="text" maxlength="20" placeholder="e.g. Mohamed" />

    <button id="btn-create">Create Room (be host)</button>
    <div class="divider">─── or ───</div>

    <label for="input-code">Room code</label>
    <input id="input-code" type="text" maxlength="6" placeholder="6-letter code" style="text-transform:uppercase; letter-spacing:6px; text-align:center;" />
    <button id="btn-join" class="secondary">Join Room</button>
  </section>

  <!-- ──── LOBBY SCREEN ──── -->
  <section id="screen-lobby" class="screen hidden">
    <h2>Waiting Lobby</h2>
    <div class="room-info">
      <small>Room code — share with friends</small>
      <div class="code" id="lobby-code"></div>
      <div class="share-link" id="lobby-link" title="Click to copy">Click to copy link</div>
    </div>

    <label>Players in room</label>
    <ul class="player-list" id="lobby-players"></ul>

    <button id="btn-start" class="hidden">Start Game</button>
    <p class="status-msg" id="lobby-wait-msg">Waiting for host to start the game…</p>
    <button class="ghost" id="btn-leave">← Leave Room</button>
  </section>

  <!-- ──── GAME SCREEN ──── -->
  <section id="screen-game" class="screen hidden">
    <div class="game-header">
      <span class="progress" id="game-progress">Question 1 / 10</span>
      <span class="timer" id="game-timer">10</span>
    </div>

    <div class="question-text" id="game-question">Loading…</div>

    <!-- Answer input (hidden during preview and results) -->
    <div id="game-input-wrap">
      <input id="game-answer" type="text" maxlength="40" placeholder="Type your answer…" autocomplete="off" />
      <button id="btn-submit">Submit Answer</button>
    </div>

    <!-- Result (hidden during preview and answer phases) -->
    <div id="game-result-wrap" class="hidden">
      <div class="result-banner" id="result-banner">BRAVO</div>
      <div class="result-reason" id="result-reason"></div>
      <div class="leaderboard-title">Leaderboard</div>
      <ul class="player-list" id="result-players"></ul>
    </div>
  </section>

  <!-- ──── FINAL SCREEN ──── -->
  <section id="screen-final" class="screen hidden">
    <h2 style="text-align:center">Game Over</h2>
    <div class="final-winner">
      <div class="crown">👑</div>
      <div class="name" id="final-winner-name"></div>
      <div class="points" id="final-winner-points"></div>
    </div>
    <div class="leaderboard-title">Final Standings</div>
    <ul class="player-list" id="final-players"></ul>
    <button id="btn-play-again" class="hidden">Play Again (same room)</button>
    <button id="btn-new" class="secondary">New Game</button>
  </section>

  <!-- Supabase client via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Fuse.js via CDN (fuzzy matching for typos) -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
  <script src="app.js"></script>
</body>
</html>
